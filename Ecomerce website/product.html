  <script>

fetch("https://api.escuelajs.co/api/v1/products")
  .then(res => res.json())
  .then(data => {

    let data1 = document.getElementById("products")
    data1.innerHTML = data.map((p) => {
      // image URL ko clean karo (kabhi kabhi API se ["url"] format mein string aati hai)
      let img = p.images[0]
        .replace("[", "")
        .replace("]", "")
        .replace(/"/g, "")

      return `
        <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col">
          <img src="${img}" 
               onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'"
               class="w-full h-48 object-cover">
          <div class="p-4 flex flex-col flex-1">
            <h3 class="text-base font-semibold mb-1">${p.title}</h3>
            <p class="text-sm text-gray-500 mb-2">${p.description.slice(0, 60)}...</p>
            <p class="text-lg font-bold mb-3">$${p.price}</p>
            <div class="flex gap-2 mt-auto">
              <button class="flex-1 border border-gray-800 py-2 rounded hover:bg-gray-100">View</button>
              <button class="flex-1 bg-gray-900 text-white py-2 rounded hover:bg-gray-700">Add</button>
            </div>
          </div>
        </div>
      `
    }).join("")

  })
