<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./library.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
</head>

<body>
    <main>
        <div class="wrapper">
            <section>
                <div class="mainpage">
                    <div class="robo">
                    </div>
                    <div class="page1content">
                        <h1>AOS</h1>
                        <h3>Animate on Scroll Library</h3>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>
                <div class="page2">
                    <div class="page2cont">Fade</div>
                    <div class="page2box">
                        <div class="boxes"  >
                            <div class="pg2box1" data-aos-offset="150px" data-aos="fade-up">
                                <div class="child1">
                                    <p> Fadeup</p>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="boxes2">
                                <div class="pg2box1" data-aos-offset="150px" data-aos="fade-down">
                                    <div class="child2" >
                                        <p>Fadedown</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="page2box">
                        <div class="boxes"  >
                            <div class="pg2box1" data-aos-offset="150px" data-aos="fade-right">
                                <div class="child3">
                                    <p> Fade Right</p>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="boxes2">
                                <div class="pg2box1" data-aos-offset="150px" data-aos="fade-left">
                                    <div class="child3" >
                                        <p>Fade Left</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                        
                </div>
            </section>
        </div>
    </main>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>
